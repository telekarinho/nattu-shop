<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FAFAF7">
  <title>Pagina nao encontrada - Nattu Shop</title>
  <link rel="icon" type="image/png" href="img/logo-full.png">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/landing.css">
  <style>
    body { font-family: 'Plus Jakarta Sans', var(--font-family); min-height:100vh; display:grid; place-items:center; background:linear-gradient(180deg,#f8faf7 0%, #eef7f0 100%); padding:24px; }
    .brand-mark { width:48px; height:48px; border-radius:16px; display:inline-flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#133326,#28c76f); color:#fff; font-weight:800; letter-spacing:.04em; box-shadow:0 10px 24px rgba(19,51,38,.18); }
    .notfound-card { max-width: 720px; background:#fff; border-radius:32px; padding:40px; box-shadow:var(--shadow-lg); border:1px solid rgba(27,67,50,.08); text-align:center; }
    .notfound-card p { color:var(--cinza-600); margin:14px 0 26px; }
    .notfound-actions { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
  </style>
</head>
<body>
  <main class="notfound-card">
    <div class="brand-mark" style="margin:0 auto 18px;">NS</div>
    <h1>Pagina nao encontrada</h1>
    <p>O endereco acessado nao existe ou foi movido. Voce pode voltar para a home, abrir o marketplace ou falar com o time comercial.</p>
    <div class="notfound-actions">
      <a href="index.html" class="btn btn-primary btn-lg">Ir para a home</a>
      <a href="catalogo.html" class="btn btn-secondary btn-lg">Abrir marketplace</a>
      <a href="contato.html" class="btn btn-secondary btn-lg">Falar com a equipe</a>
    </div>
  </main>
</body>
</html>
