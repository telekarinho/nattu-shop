<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Clube do Natural</title>
<link rel="icon" href="/img/logo-icon.png">
<link rel="manifest" href="/manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:#F5F0E8;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.login-container{
  background:white;border-radius:20px;padding:48px 40px;
  max-width:420px;width:100%;text-align:center;
  box-shadow:0 8px 40px rgba(27,67,50,0.12);
}
.logo{font-size:48px;margin-bottom:8px}
.brand{
  font-size:24px;font-weight:700;color:#1B4332;margin-bottom:4px;
}
.brand span{color:#2D6A4F}
.subtitle{color:#888;font-size:14px;margin-bottom:32px}
.divider{
  display:flex;align-items:center;gap:12px;margin:24px 0;
  color:#bbb;font-size:13px;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e0e0e0}

.btn-google{
  display:flex;align-items:center;justify-content:center;gap:12px;
  width:100%;padding:14px 24px;border-radius:12px;
  border:2px solid #e0e0e0;background:white;cursor:pointer;
  font-size:16px;font-weight:600;color:#333;
  transition:all 0.2s;
}
.btn-google:hover{border-color:#2D6A4F;background:#f9f9f9;transform:translateY(-1px)}
.btn-google:active{transform:translateY(0)}
.btn-google svg{width:22px;height:22px}
.btn-google.loading{opacity:0.6;pointer-events:none}

.error-msg{
  background:#fef2f2;color:#E63946;padding:12px 16px;border-radius:10px;
  font-size:13px;margin-top:16px;display:none;
}
.error-msg.show{display:block}

.setup-link{
  margin-top:24px;font-size:12px;color:#aaa;
}
.setup-link a{color:#2D6A4F;text-decoration:none}
.setup-link a:hover{text-decoration:underline}

.footer-info{
  margin-top:32px;padding-top:20px;border-top:1px solid #f0f0f0;
  font-size:12px;color:#bbb;line-height:1.6;
}

/* Not configured state */
.not-configured{display:none}
.not-configured.show{display:block}
.not-configured h3{color:#C4972A;font-size:18px;margin-bottom:8px}
.not-configured p{color:#666;font-size:14px;line-height:1.5;margin-bottom:16px}
.btn-setup{
  display:inline-block;background:#2D6A4F;color:white;
  padding:12px 28px;border-radius:10px;text-decoration:none;
  font-weight:600;font-size:15px;
}
.btn-setup:hover{background:#1B4332}
</style>
</head>
<body>

<div class="login-container">
  <!-- Normal login state -->
  <div id="login-panel">
    <div class="logo">🌿</div>
    <div class="brand">Clube do <span>Natural</span></div>
    <p class="subtitle">Faça login para acessar o sistema</p>

    <button class="btn-google" id="btn-google-login" onclick="doGoogleLogin()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Entrar com Google
    </button>

    <div class="error-msg" id="error-msg"></div>

    <div class="footer-info">
      Acesso restrito. Após o login, o administrador<br>
      deve aprovar seu acesso ao sistema.
    </div>
  </div>

  <!-- Not configured state -->
  <div class="not-configured" id="not-configured">
    <div class="logo">⚙️</div>
    <h3>Firebase não configurado</h3>
    <p>O sistema precisa ser conectado ao Firebase para autenticação e banco de dados.</p>
    <a href="/admin/setup.html" class="btn-setup">Configurar Firebase</a>
  </div>

  <div class="setup-link" id="setup-link">
    <a href="/admin/setup.html">Configuração do sistema</a>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="/js/core/firebase-config.js"></script>
<script src="/js/core/firebase-auth.js"></script>

<script>
  // Check if Firebase is configured
  if (!CdnFirebase.isConfigured()) {
    document.getElementById('login-panel').style.display = 'none';
    document.getElementById('not-configured').classList.add('show');
  } else {
    CdnFirebase.init();
    if (CdnFirebase.ready) {
      // Handle redirect result (fallback when popup is blocked)
      CdnFirebase.auth.getRedirectResult().then(async (result) => {
        if (result && result.user) {
          console.log('[Login] Redirect result OK:', result.user.email);
          const userData = await CdnAuth._ensureUserDoc(result.user);
          if (userData.approved) {
            const params = new URLSearchParams(window.location.search);
            const returnUrl = params.get('r') || '/admin/';
            window.location.href = decodeURIComponent(returnUrl);
          } else {
            showPendingUI(result.user);
          }
        }
      }).catch((err) => {
        console.error('Redirect result error:', err);
        if (err.code === 'auth/unauthorized-domain') {
          showErrorMsg('Dominio nao autorizado no Firebase. Adicione seu dominio em Authentication > Settings > Authorized domains no console Firebase.');
        } else if (err.code === 'auth/web-storage-unsupported') {
          showErrorMsg('Seu navegador bloqueou o armazenamento necessario para login. Desative o bloqueio de cookies de terceiros nas configuracoes.');
        } else {
          showErrorMsg('Erro no login: ' + (err.code || err.message));
        }
      });

      // If already logged in (or just returned from redirect), handle user
      CdnFirebase.auth.onAuthStateChanged(async (user) => {
        if (user) {
          try {
            // Ensure user doc exists (creates it for first-time users)
            const userData = await CdnAuth._ensureUserDoc(user);
            if (userData.approved) {
              const params = new URLSearchParams(window.location.search);
              const returnUrl = params.get('r') || '/admin/';
              window.location.href = decodeURIComponent(returnUrl);
            } else {
              showPendingUI(user);
            }
          } catch(e) {
            console.error('Auth state error:', e);
            showErrorMsg('Erro ao verificar conta: ' + (e.code || e.message));
          }
        }
      });
    }
  }

  function showErrorMsg(msg) {
    const errorDiv = document.getElementById('error-msg');
    errorDiv.textContent = msg;
    errorDiv.classList.add('show');
  }

  function showPendingUI(user) {
    document.querySelector('.login-container').innerHTML = `
      <div style="text-align:center;padding:20px">
        <div style="font-size:64px;margin-bottom:12px">&#9203;</div>
        <h2 style="color:#1B4332;margin-bottom:8px">Aguardando Aprovacao</h2>
        <p style="color:#666;font-size:14px;margin-bottom:20px;line-height:1.5">
          Sua conta <strong>${user.email}</strong> foi registrada!<br>
          O administrador precisa aprovar seu acesso.
        </p>
        <div style="display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:24px">
          ${user.photoURL ? '<img src="' + user.photoURL + '" style="width:40px;height:40px;border-radius:50%">' : ''}
          <span style="color:#333;font-size:14px">${user.displayName || user.email}</span>
        </div>
        <button onclick="firebase.auth().signOut().then(()=>location.reload())"
          style="background:none;border:1px solid #ccc;padding:10px 24px;border-radius:8px;cursor:pointer;color:#666;font-size:14px">
          Sair e trocar conta
        </button>
      </div>
    `;
  }

  async function doGoogleLogin() {
    const btn = document.getElementById('btn-google-login');
    const errorDiv = document.getElementById('error-msg');
    errorDiv.classList.remove('show');
    btn.classList.add('loading');
    btn.innerHTML = '<span style="animation:cdnSpin 0.8s linear infinite;display:inline-block">⏳</span> Entrando...';

    try {
      const result = await CdnAuth.signInWithGoogle();
      // If redirect was used (fallback), result is undefined — page will reload
      if (!result || !result.user) return;
      const user = result.user;

      // Ensure user doc exists
      const userData = await CdnAuth._ensureUserDoc(user);

      if (userData.approved) {
        const params = new URLSearchParams(window.location.search);
        const returnUrl = params.get('r') || '/admin/';
        window.location.href = decodeURIComponent(returnUrl);
      } else {
        // Show pending approval
        document.querySelector('.login-container').innerHTML = `
          <div style="text-align:center;padding:20px">
            <div style="font-size:64px;margin-bottom:12px">⏳</div>
            <h2 style="color:#1B4332;margin-bottom:8px">Aguardando Aprovação</h2>
            <p style="color:#666;font-size:14px;margin-bottom:20px;line-height:1.5">
              Sua conta <strong>${user.email}</strong> foi registrada!<br>
              O administrador precisa aprovar seu acesso.
            </p>
            <div style="display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:24px">
              ${user.photoURL ? `<img src="${user.photoURL}" style="width:40px;height:40px;border-radius:50%">` : ''}
              <span style="color:#333;font-size:14px">${user.displayName || user.email}</span>
            </div>
            <button onclick="firebase.auth().signOut().then(()=>location.reload())"
              style="background:none;border:1px solid #ccc;padding:10px 24px;border-radius:8px;cursor:pointer;color:#666;font-size:14px">
              Sair e trocar conta
            </button>
          </div>
        `;
      }
    } catch (err) {
      console.error('Login error:', err);
      btn.classList.remove('loading');
      btn.innerHTML = `
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="22" height="22">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Entrar com Google
      `;

      let msg = 'Erro ao fazer login. ';
      if (err.code === 'auth/popup-closed-by-user') msg = 'Login cancelado. Tente novamente.';
      else if (err.code === 'auth/unauthorized-domain') msg = 'Dominio nao autorizado no Firebase. Adicione o dominio deste site em Authentication > Settings > Authorized domains no console Firebase (ex: www.clubedonatural.com, clubedonatural.com, clubedonatural.vercel.app).';
      else if (err.code === 'auth/popup-blocked') msg = 'Popup bloqueado pelo navegador. Tente permitir popups ou use outro navegador.';
      else if (err.code === 'auth/cancelled-popup-request') msg = 'Login cancelado. Tente novamente.';
      else if (err.code === 'auth/network-request-failed') msg = 'Sem internet. Verifique sua conexao.';
      else msg += (err.code || err.message || 'Erro desconhecido');

      errorDiv.textContent = msg;
      errorDiv.classList.add('show');
    }
  }
</script>

<style>@keyframes cdnSpin{to{transform:rotate(360deg)}}</style>
</body>
</html>
