<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f7e6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8f5d8;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="200" r="180" fill="url(#bg)" stroke="#c5d9a4" stroke-width="3"/>
  <!-- Bowl -->
  <ellipse cx="200" cy="260" rx="90" ry="30" fill="#8B7355"/>
  <path d="M110 240 Q110 290 200 290 Q290 290 290 240 L290 260 Q290 290 200 290 Q110 290 110 260Z" fill="#A0845C"/>
  <ellipse cx="200" cy="240" rx="90" ry="30" fill="#C4A97D"/>
  <!-- Chia seeds scattered -->
  <g fill="#4A5D3A">
    <ellipse cx="170" cy="230" rx="4" ry="3" transform="rotate(-20 170 230)"/>
    <ellipse cx="185" cy="225" rx="4" ry="3" transform="rotate(15 185 225)"/>
    <ellipse cx="200" cy="228" rx="4" ry="3" transform="rotate(-10 200 228)"/>
    <ellipse cx="215" cy="224" rx="4" ry="3" transform="rotate(25 215 224)"/>
    <ellipse cx="230" cy="230" rx="4" ry="3" transform="rotate(-5 230 230)"/>
    <ellipse cx="178" cy="238" rx="4" ry="3" transform="rotate(10 178 238)"/>
    <ellipse cx="195" cy="235" rx="4" ry="3" transform="rotate(-15 195 235)"/>
    <ellipse cx="210" cy="237" rx="4" ry="3" transform="rotate(20 210 237)"/>
    <ellipse cx="225" cy="234" rx="4" ry="3" transform="rotate(-25 225 234)"/>
    <ellipse cx="190" cy="245" rx="4" ry="3" transform="rotate(5 190 245)"/>
    <ellipse cx="205" cy="243" rx="4" ry="3" transform="rotate(-8 205 243)"/>
    <ellipse cx="220" cy="246" rx="4" ry="3" transform="rotate(12 220 246)"/>
  </g>
  <!-- Falling seeds -->
  <g fill="#5A6D4A" opacity="0.7">
    <ellipse cx="195" cy="190" rx="3" ry="2" transform="rotate(30 195 190)"/>
    <ellipse cx="210" cy="195" rx="3" ry="2" transform="rotate(-20 210 195)"/>
    <ellipse cx="180" cy="200" rx="3" ry="2" transform="rotate(45 180 200)"/>
    <ellipse cx="220" cy="205" rx="3" ry="2" transform="rotate(-35 220 205)"/>
  </g>
  <!-- Leaf decoration -->
  <g transform="translate(200,140)">
    <path d="M0,0 Q-25,-40 -10,-60 Q5,-40 0,0" fill="#6B8E4E"/>
    <path d="M0,0 Q25,-40 10,-60 Q-5,-40 0,0" fill="#7DA65E"/>
    <line x1="0" y1="0" x2="-5" y2="-35" stroke="#5A7D3E" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="5" y2="-35" stroke="#5A7D3E" stroke-width="1.5"/>
  </g>
  <text x="200" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#4A5D3A">Sementes de Chia</text>
</svg>