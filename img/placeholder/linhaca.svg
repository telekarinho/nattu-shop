<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf5e8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f5edd6;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="200" r="180" fill="url(#bg)" stroke="#d4c49a" stroke-width="3"/>
  <!-- Wooden spoon -->
  <g transform="translate(200,200) rotate(-30)">
    <rect x="-8" y="20" width="16" height="100" rx="5" fill="#B8935A"/>
    <ellipse cx="0" cy="0" rx="45" ry="30" fill="#C9A46C"/>
    <ellipse cx="0" cy="-2" rx="38" ry="24" fill="#D4B27E"/>
  </g>
  <!-- Golden flax seeds in spoon -->
  <g fill="#C8A840" transform="translate(200,195) rotate(-30)">
    <ellipse cx="-12" cy="-5" rx="5" ry="3" transform="rotate(20)"/>
    <ellipse cx="0" cy="-8" rx="5" ry="3" transform="rotate(-15)"/>
    <ellipse cx="12" cy="-3" rx="5" ry="3" transform="rotate(30)"/>
    <ellipse cx="-8" cy="3" rx="5" ry="3" transform="rotate(-10)"/>
    <ellipse cx="5" cy="2" rx="5" ry="3" transform="rotate(25)"/>
    <ellipse cx="-3" cy="8" rx="5" ry="3" transform="rotate(-20)"/>
    <ellipse cx="10" cy="7" rx="5" ry="3" transform="rotate(15)"/>
    <ellipse cx="-15" cy="5" rx="5" ry="3" transform="rotate(5)"/>
    <ellipse cx="18" cy="3" rx="5" ry="3" transform="rotate(-5)"/>
  </g>
  <!-- Scattered seeds around -->
  <g fill="#B89830" opacity="0.6">
    <ellipse cx="130" cy="280" rx="4" ry="2.5" transform="rotate(40 130 280)"/>
    <ellipse cx="260" cy="160" rx="4" ry="2.5" transform="rotate(-30 260 160)"/>
    <ellipse cx="280" cy="270" rx="4" ry="2.5" transform="rotate(15 280 270)"/>
    <ellipse cx="150" cy="150" rx="4" ry="2.5" transform="rotate(-25 150 150)"/>
  </g>
  <text x="200" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#8B7340">Linhaça Dourada</text>
</svg>