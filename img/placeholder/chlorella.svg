<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2e0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c8e8c8;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="200" r="180" fill="url(#bg)" stroke="#7baa7b" stroke-width="3"/>
  <!-- Jar -->
  <rect x="150" y="155" width="100" height="120" rx="8" fill="#2E7D32"/>
  <rect x="160" y="140" width="80" height="20" rx="4" fill="#E0E0E0"/>
  <rect x="155" y="158" width="90" height="15" rx="3" fill="#1B5E20" opacity="0.5"/>
  <!-- Cap -->
  <rect x="165" y="128" width="70" height="16" rx="5" fill="#BDBDBD"/>
  <!-- Label -->
  <rect x="163" y="185" width="74" height="40" rx="4" fill="white" opacity="0.9"/>
  <text x="200" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1B5E20">CHLORELLA</text>
  <text x="200" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4CAF50">100% Pura</text>
  <!-- Floating tablets -->
  <g fill="#33691E">
    <circle cx="130" cy="240" r="8"/><circle cx="270" cy="230" r="8"/>
    <circle cx="140" cy="190" r="6"/><circle cx="265" cy="180" r="6"/>
  </g>
  <text x="200" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1B5E20">Chlorella</text>
</svg>