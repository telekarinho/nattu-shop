<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d0ebd0;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="200" r="180" fill="url(#bg)" stroke="#8bb88b" stroke-width="3"/>
  <!-- Capsule/tablet -->
  <g transform="translate(200,190)">
    <rect x="-30" y="-60" width="60" height="120" rx="30" fill="#1B5E20"/>
    <rect x="-30" y="-60" width="60" height="60" rx="30" fill="#2E7D32"/>
    <line x1="-30" y1="0" x2="30" y2="0" stroke="#1B5E20" stroke-width="1.5"/>
  </g>
  <!-- Spirulina spirals around -->
  <g stroke="#2E7D32" stroke-width="2.5" fill="none" opacity="0.5">
    <path d="M100,150 Q110,130 120,150 Q130,170 140,150"/>
    <path d="M260,140 Q270,120 280,140 Q290,160 300,140"/>
    <path d="M110,260 Q120,240 130,260 Q140,280 150,260"/>
    <path d="M250,270 Q260,250 270,270 Q280,290 290,270"/>
  </g>
  <!-- Small powder dots -->
  <g fill="#2E7D32" opacity="0.3">
    <circle cx="145" cy="200" r="3"/><circle cx="255" cy="195" r="3"/>
    <circle cx="150" cy="220" r="2"/><circle cx="250" cy="215" r="2"/>
  </g>
  <text x="200" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1B5E20">Spirulina</text>
</svg>