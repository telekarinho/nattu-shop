<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbe9e7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f5d4cf;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="200" r="180" fill="url(#bg)" stroke="#c9886c" stroke-width="3"/>
  <!-- Cinnamon sticks -->
  <g transform="translate(200,190) rotate(-15)">
    <!-- Stick 1 -->
    <rect x="-70" y="-12" width="140" height="24" rx="12" fill="#8D5524"/>
    <rect x="-70" y="-12" width="140" height="12" rx="6" fill="#A0633B"/>
    <!-- Spiral end -->
    <circle cx="70" cy="0" r="12" fill="#8D5524"/>
    <circle cx="70" cy="0" r="7" fill="#6D3A1A"/>
    <circle cx="70" cy="0" r="4" fill="#8D5524"/>
    <!-- Texture -->
    <line x1="-60" y1="-5" x2="55" y2="-5" stroke="#6D3A1A" stroke-width="0.5" opacity="0.4"/>
    <line x1="-60" y1="2" x2="55" y2="2" stroke="#6D3A1A" stroke-width="0.5" opacity="0.4"/>
  </g>
  <g transform="translate(200,210) rotate(-20)">
    <!-- Stick 2 -->
    <rect x="-65" y="-10" width="130" height="20" rx="10" fill="#7B4820"/>
    <rect x="-65" y="-10" width="130" height="10" rx="5" fill="#8D5524"/>
    <circle cx="65" cy="0" r="10" fill="#7B4820"/>
    <circle cx="65" cy="0" r="6" fill="#5D3015"/>
    <circle cx="65" cy="0" r="3" fill="#7B4820"/>
  </g>
  <!-- Powder sprinkle -->
  <g fill="#A0633B" opacity="0.4">
    <circle cx="150" cy="260" r="2"/><circle cx="170" cy="268" r="1.5"/>
    <circle cx="230" cy="255" r="2"/><circle cx="245" cy="265" r="1.5"/>
    <circle cx="190" cy="270" r="1.8"/><circle cx="210" cy="275" r="1.5"/>
  </g>
  <!-- Star anise accent -->
  <g transform="translate(130,145) scale(0.6)">
    <g fill="#8D5524" opacity="0.6">
      <ellipse cx="0" cy="-15" rx="5" ry="10"/>
      <ellipse cx="13" cy="-7" rx="5" ry="10" transform="rotate(60 13 -7)"/>
      <ellipse cx="13" cy="7" rx="5" ry="10" transform="rotate(120 13 7)"/>
      <ellipse cx="0" cy="15" rx="5" ry="10"/>
      <ellipse cx="-13" cy="7" rx="5" ry="10" transform="rotate(-120 -13 7)"/>
      <ellipse cx="-13" cy="-7" rx="5" ry="10" transform="rotate(-60 -13 -7)"/>
    </g>
    <circle cx="0" cy="0" r="4" fill="#5D3015"/>
  </g>
  <text x="200" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#6D3A1A">Canela</text>
</svg>