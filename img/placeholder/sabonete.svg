<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="soap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A5D6A7"/>
      <stop offset="100%" style="stop-color:#81C784"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="200" r="180" fill="url(#bg)" stroke="#81c784" stroke-width="3"/>
  <!-- Soap bar -->
  <g transform="translate(200,200)">
    <rect x="-50" y="-25" width="100" height="50" rx="15" fill="url(#soap)"/>
    <rect x="-50" y="-25" width="100" height="25" rx="15" fill="#C8E6C9" opacity="0.4"/>
    <!-- Embossed text -->
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#388E3C" opacity="0.5">NATURAL</text>
    <!-- Shine -->
    <ellipse cx="-25" cy="-15" rx="12" ry="5" fill="white" opacity="0.3" transform="rotate(-20 -25 -15)"/>
  </g>
  <!-- Bubbles -->
  <g fill="none" stroke="#B0BEC5" stroke-width="1.5" opacity="0.5">
    <circle cx="280" cy="160" r="12"/>
    <circle cx="295" cy="140" r="8"/>
    <circle cx="270" cy="140" r="6"/>
    <circle cx="300" cy="158" r="5"/>
    <circle cx="260" cy="155" r="4"/>
  </g>
  <!-- Highlights in bubbles -->
  <g fill="white" opacity="0.4">
    <circle cx="276" cy="156" r="3"/><circle cx="292" cy="137" r="2"/>
  </g>
  <!-- Leaf decoration -->
  <g transform="translate(140,160)">
    <path d="M0,5 Q-18,-10 -8,-28 Q5,-10 0,5" fill="#66BB6A"/>
    <path d="M0,5 Q18,-10 8,-28 Q-5,-10 0,5" fill="#81C784"/>
    <line x1="0" y1="5" x2="0" y2="-15" stroke="#4CAF50" stroke-width="1"/>
  </g>
  <text x="200" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2E7D32">Sabonete Natural</text>
</svg>