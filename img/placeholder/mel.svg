<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8e1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffe0b2;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="honey" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB300"/>
      <stop offset="100%" style="stop-color:#FF8F00"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="200" r="180" fill="url(#bg)" stroke="#ffb74d" stroke-width="3"/>
  <!-- Honey jar -->
  <g transform="translate(200,210)">
    <rect x="-45" y="-50" width="90" height="90" rx="12" fill="url(#honey)"/>
    <rect x="-45" y="-50" width="90" height="35" rx="12" fill="#FFC107" opacity="0.5"/>
    <!-- Jar neck -->
    <rect x="-30" y="-62" width="60" height="15" rx="3" fill="#FFB300"/>
    <!-- Lid -->
    <rect x="-35" y="-75" width="70" height="16" rx="5" fill="#F5F5DC"/>
    <path d="M-35,-68 Q-35,-78 -25,-78 L25,-78 Q35,-78 35,-68" fill="none" stroke="#D4C090" stroke-width="1.5"/>
    <!-- Label -->
    <rect x="-35" y="-20" width="70" height="35" rx="5" fill="white" opacity="0.85"/>
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#E65100">MEL</text>
    <text x="0" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FF8F00">Silvestre</text>
    <!-- Honey drip -->
    <path d="M30,-45 Q35,-40 33,-30 Q30,-20 32,-15" stroke="#FF8F00" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="32" cy="-12" r="5" fill="#FF8F00"/>
  </g>
  <!-- Bee -->
  <g transform="translate(130,130) scale(0.7)">
    <ellipse cx="0" cy="0" rx="12" ry="9" fill="#FFC107"/>
    <line x1="-4" y1="-8" x2="-4" y2="8" stroke="#333" stroke-width="2"/>
    <line x1="4" y1="-8" x2="4" y2="8" stroke="#333" stroke-width="2"/>
    <circle cx="12" cy="-2" r="4" fill="#333"/>
    <path d="M-5,-8 Q-15,-20 -5,-22" fill="none" stroke="#ccc" stroke-width="1"/>
    <path d="M5,-8 Q15,-20 5,-22" fill="none" stroke="#ccc" stroke-width="1"/>
    <ellipse cx="-10" cy="-15" rx="8" ry="4" fill="white" opacity="0.6" transform="rotate(-20 -10 -15)"/>
    <ellipse cx="10" cy="-15" rx="8" ry="4" fill="white" opacity="0.6" transform="rotate(20 10 -15)"/>
  </g>
  <text x="200" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#E65100">Mel Silvestre</text>
</svg>