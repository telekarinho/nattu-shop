<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbe9e7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffccbc;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="200" r="180" fill="url(#bg)" stroke="#e57373" stroke-width="3"/>
  <!-- Chili peppers -->
  <g transform="translate(200,180)">
    <!-- Pepper 1 -->
    <path d="M-30,-40 Q-50,-20 -45,15 Q-42,35 -30,50 Q-28,35 -25,15 Q-22,-10 -30,-40" fill="#D32F2F"/>
    <path d="M-30,-40 Q-28,-42 -25,-38 Q-20,-20 -25,15" fill="#E53935" opacity="0.6"/>
    <rect x="-32" y="-48" width="6" height="10" rx="2" fill="#4CAF50"/>
    <!-- Pepper 2 -->
    <path d="M10,-30 Q-5,-10 -2,20 Q0,42 10,55 Q12,38 14,20 Q16,-5 10,-30" fill="#C62828"/>
    <path d="M10,-30 Q12,-32 14,-28 Q18,-10 14,20" fill="#EF5350" opacity="0.5"/>
    <rect x="8" y="-38" width="6" height="10" rx="2" fill="#388E3C"/>
    <!-- Pepper 3 (smaller, yellow) -->
    <path d="M40,-20 Q28,-5 30,15 Q32,30 40,40 Q42,28 43,15 Q44,0 40,-20" fill="#FF6F00"/>
    <rect x="38" y="-27" width="5" height="8" rx="2" fill="#4CAF50"/>
  </g>
  <!-- Pepper flakes scattered -->
  <g fill="#D32F2F" opacity="0.4">
    <circle cx="130" cy="270" r="3"/><circle cx="270" cy="260" r="2.5"/>
    <circle cx="150" cy="250" r="2"/><circle cx="250" cy="280" r="2"/>
  </g>
  <text x="200" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#C62828">Pimenta Caiena</text>
</svg>