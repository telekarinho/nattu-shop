  <!-- Date -->
  <ellipse cx="155" cy="235" rx="10" ry="5" fill="#3E2723" transform="rotate(-20 155 235)"/>
  <text x="200" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#E65100">Frutas Secas</text>
</svg>