<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf5e6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f5e6c8;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="200" r="180" fill="url(#bg)" stroke="#c9a86c" stroke-width="3"/>
  <!-- Ginger root -->
  <g transform="translate(200,190)">
    <!-- Main body -->
    <path d="M-20,20 Q-40,15 -55,0 Q-60,-20 -40,-25 Q-25,-28 -15,-10 Q-10,5 0,0 Q10,-10 25,-15 Q45,-18 55,-5 Q60,10 45,20 Q30,25 15,15 Q5,25 -10,25 Q-15,22 -20,20Z" fill="#C9A86C"/>
    <!-- Knob branches -->
    <path d="M-40,-25 Q-50,-40 -35,-45 Q-20,-42 -25,-28" fill="#D4B87D"/>
    <path d="M30,-15 Q40,-35 55,-30 Q58,-18 45,-12" fill="#D4B87D"/>
    <path d="M-15,20 Q-25,35 -15,40 Q-5,38 -5,25" fill="#D4B87D"/>
    <!-- Texture lines -->
    <g stroke="#B89860" stroke-width="0.8" fill="none" opacity="0.5">
      <path d="M-35,-5 Q-25,-8 -15,0"/>
      <path d="M5,0 Q15,-5 25,-2"/>
      <path d="M-30,8 Q-20,5 -10,10"/>
      <path d="M10,10 Q20,7 30,12"/>
    </g>
    <!-- Cut section showing yellow inside -->
    <ellipse cx="55" cy="-5" rx="12" ry="15" fill="#FFD54F"/>
    <ellipse cx="55" cy="-5" rx="8" ry="11" fill="#FFECB3"/>
  </g>
  <text x="200" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#8D6E00">Gengibre</text>
</svg>