<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2f1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b2dfdb;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="200" r="180" fill="url(#bg)" stroke="#80cbc4" stroke-width="3"/>
  <!-- Deodorant stick -->
  <g transform="translate(200,200)">
    <!-- Body -->
    <rect x="-28" y="-55" width="56" height="100" rx="10" fill="#F5F5F5"/>
    <rect x="-28" y="-55" width="56" height="40" rx="10" fill="#E0F2F1"/>
    <!-- Cap -->
    <rect x="-30" y="-75" width="60" height="24" rx="12" fill="#00897B"/>
    <rect x="-30" y="-75" width="60" height="12" rx="12" fill="#00897B"/>
    <!-- Product top (rounded) -->
    <ellipse cx="0" cy="-55" rx="25" ry="6" fill="#E0F2F1"/>
    <!-- Label -->
    <rect x="-22" y="-10" width="44" height="35" rx="5" fill="white" opacity="0.9"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#00695C">DESODORANTE</text>
    <text x="0" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#00897B">Natural</text>
    <!-- Leaf icon on label -->
    <g transform="translate(0,-3) scale(0.4)">
      <path d="M0,5 Q-15,-15 -5,-28 Q5,-15 0,5" fill="#4DB6AC"/>
      <path d="M0,5 Q15,-15 5,-28 Q-5,-15 0,5" fill="#80CBC4"/>
    </g>
    <!-- Bottom dial -->
    <rect x="-18" y="38" width="36" height="8" rx="3" fill="#E0E0E0"/>
  </g>
  <!-- Fresh scent lines -->
  <g stroke="#80CBC4" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M140,160 Q135,150 140,140"/>
    <path d="M130,170 Q125,155 130,140"/>
    <path d="M260,160 Q265,150 260,140"/>
    <path d="M270,170 Q275,155 270,140"/>
  </g>
  <text x="200" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#00695C">Desodorante Natural</text>
</svg>