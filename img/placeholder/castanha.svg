<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf5e6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f5e6c8;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="200" r="180" fill="url(#bg)" stroke="#c9a86c" stroke-width="3"/>
  <!-- Brazil nut shell (coco) -->
  <g transform="translate(200,155)">
    <circle cx="0" cy="0" r="40" fill="#5D4037"/>
    <circle cx="0" cy="0" r="36" fill="#6D4C41"/>
    <!-- Opening showing nuts inside -->
    <path d="M-20,-10 Q0,-25 20,-10 Q15,5 0,5 Q-15,5 -20,-10" fill="#3E2723"/>
    <path d="M-12,-8 Q0,-16 12,-8" fill="#D4A050"/>
    <path d="M-8,-6 Q0,-12 8,-6" fill="#C8935A"/>
  </g>
  <!-- Individual brazil nuts -->
  <g transform="translate(200,240)">
    <path d="M-30,-5 Q-32,-15 -20,-18 Q-8,-15 -5,-5 Q-8,5 -20,8 Q-32,5 -30,-5" fill="#D4A050"/>
    <path d="M5,-8 Q3,-18 15,-20 Q27,-17 30,-8 Q27,3 15,5 Q3,3 5,-8" fill="#C8935A"/>
    <path d="M-15,10 Q-17,0 -5,-3 Q7,0 10,10 Q7,20 -5,22 Q-17,20 -15,10" fill="#D4A050"/>
    <!-- Highlights -->
    <path d="M-28,-10 Q-25,-14 -18,-15" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
    <path d="M7,-13 Q10,-17 17,-18" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Leaf -->
  <g transform="translate(265,135)">
    <path d="M0,5 Q-15,-15 -5,-30 Q5,-15 0,5" fill="#66BB6A"/>
    <path d="M0,5 Q15,-15 5,-30 Q-5,-15 0,5" fill="#81C784"/>
    <line x1="0" y1="5" x2="0" y2="-18" stroke="#4CAF50" stroke-width="1"/>
  </g>
  <text x="200" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#5D4037">Castanha-do-Pará</text>
</svg>