<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c8e6c9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A"/>
      <stop offset="100%" style="stop-color:#43A047"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="200" r="180" fill="url(#bg)" stroke="#81c784" stroke-width="3"/>
  <!-- Shampoo bottle -->
  <g transform="translate(200,205)">
    <!-- Body -->
    <rect x="-35" y="-40" width="70" height="100" rx="12" fill="url(#bottle)"/>
    <!-- Shoulder -->
    <path d="M-35,-40 L-20,-60 Q-15,-65 15,-65 L20,-60 L35,-40" fill="#4CAF50"/>
    <!-- Pump top -->
    <rect x="-8" y="-75" width="16" height="14" rx="3" fill="#BDBDBD"/>
    <rect x="-20" y="-82" width="18" height="8" rx="3" fill="#9E9E9E"/>
    <rect x="-20" y="-84" width="3" height="12" rx="1" fill="#9E9E9E"/>
    <!-- Nozzle -->
    <rect x="-25" y="-86" width="10" height="5" rx="2" fill="#BDBDBD"/>
    <!-- Label -->
    <rect x="-28" y="-15" width="56" height="40" rx="5" fill="white" opacity="0.9"/>
    <text x="0" y="2" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2E7D32">SHAMPOO</text>
    <text x="0" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4CAF50">Natural</text>
    <!-- Leaf on label -->
    <g transform="translate(0,-8) scale(0.35)">
      <path d="M0,5 Q-15,-15 -5,-28 Q5,-15 0,5" fill="#A5D6A7"/>
      <path d="M0,5 Q15,-15 5,-28 Q-5,-15 0,5" fill="#C8E6C9"/>
    </g>
  </g>
  <!-- Leaves decoration -->
  <g transform="translate(290,155) scale(0.6)">
    <path d="M0,5 Q-20,-15 -8,-35 Q5,-15 0,5" fill="#66BB6A"/>
    <path d="M0,5 Q20,-15 8,-35 Q-5,-15 0,5" fill="#81C784"/>
  </g>
  <g transform="translate(115,165) scale(0.5)">
    <path d="M0,5 Q-18,-12 -6,-30 Q5,-12 0,5" fill="#66BB6A"/>
    <path d="M0,5 Q18,-12 6,-30 Q-5,-12 0,5" fill="#81C784"/>
  </g>
  <text x="200" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2E7D32">Shampoo Natural</text>
</svg>