<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3f8ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e3eef8;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="200" r="180" fill="url(#bg)" stroke="#90caf9" stroke-width="3"/>
  <!-- Glass jar -->
  <g transform="translate(200,205)">
    <!-- Jar body -->
    <rect x="-40" y="-50" width="80" height="95" rx="8" fill="white" opacity="0.4" stroke="#B0BEC5" stroke-width="2"/>
    <!-- Kefir liquid -->
    <rect x="-36" y="-20" width="72" height="61" rx="6" fill="#F5F5DC" opacity="0.8"/>
    <rect x="-36" y="-20" width="72" height="25" rx="6" fill="white" opacity="0.3"/>
    <!-- Kefir grains -->
    <g fill="#F5F5DC" stroke="#E0D8C0" stroke-width="0.5">
      <circle cx="-15" cy="10" r="5"/><circle cx="-5" cy="15" r="6"/>
      <circle cx="8" cy="12" r="5"/><circle cx="18" cy="18" r="4"/>
      <circle cx="-8" cy="22" r="5"/><circle cx="5" cy="25" r="4"/>
      <circle cx="-20" cy="18" r="4"/><circle cx="15" cy="8" r="4"/>
    </g>
    <!-- Lid -->
    <rect x="-42" y="-58" width="84" height="12" rx="4" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="1"/>
    <!-- Cloth cover texture -->
    <rect x="-44" y="-62" width="88" height="8" rx="3" fill="#FFF8E1"/>
    <path d="M-44,-54 Q-20,-50 0,-54 Q20,-50 44,-54" fill="none" stroke="#E0D8C0" stroke-width="1"/>
    <!-- Rubber band -->
    <rect x="-43" y="-55" width="86" height="3" rx="1" fill="#A1887F"/>
  </g>
  <!-- Probiotic symbols (tiny organisms) -->
  <g fill="#90CAF9" opacity="0.3">
    <circle cx="130" cy="180" r="4"/><circle cx="135" cy="175" r="3"/>
    <circle cx="270" cy="175" r="4"/><circle cx="265" cy="180" r="3"/>
  </g>
  <text x="200" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1565C0">Kefir</text>
</svg>