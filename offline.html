<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1B4332">
  <title>Offline — Clube do Natural</title>
  <link rel="icon" type="image/png" href="img/logo-full.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F5F0E8;
      color: #343A40;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .offline-card {
      background: #fff;
      border-radius: 16px;
      padding: 3rem 2rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .offline-icon {
      width: 80px;
      height: 80px;
      background: #E8F5E9;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2.5rem;
    }

    .offline-card h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1B4332;
      margin-bottom: 0.75rem;
    }

    .offline-card p {
      font-size: 1rem;
      color: #6C757D;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .btn-retry {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      background: #2D6A4F;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }

    .btn-retry:hover {
      background: #1B4332;
    }

    .btn-retry:active {
      transform: scale(0.97);
    }

    .brand {
      margin-top: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: #ADB5BD;
    }

    .brand img {
      width: 24px;
      height: 24px;
      border-radius: 4px;
    }

    .tips {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #E9ECEF;
      text-align: left;
    }

    .tips h2 {
      font-size: 0.875rem;
      font-weight: 600;
      color: #2D6A4F;
      margin-bottom: 0.5rem;
    }

    .tips ul {
      list-style: none;
      font-size: 0.875rem;
      color: #6C757D;
      line-height: 1.8;
    }

    .tips ul li::before {
      content: "\2022";
      color: #52B788;
      font-weight: bold;
      margin-right: 0.5rem;
    }
  </style>
</head>
<body>

  <div class="offline-card">
    <div class="offline-icon">&#x1F4F6;</div>

    <h1>Sem conexão</h1>
    <p>
      Parece que você está offline. Verifique sua conexão com a internet e tente novamente.
    </p>

    <button class="btn-retry" onclick="window.location.reload()">
      Tentar novamente
    </button>

    <div class="tips">
      <h2>Enquanto isso, você pode:</h2>
      <ul>
        <li>Verificar se o Wi-Fi está ligado</li>
        <li>Desativar e reativar os dados móveis</li>
        <li>Acessar páginas já visitadas (podem estar em cache)</li>
      </ul>
    </div>
  </div>

  <div class="brand">
    <img src="img/logo-icon.png" alt="" onerror="this.style.display='none'">
    Clube do Natural
  </div>

</body>
</html>
